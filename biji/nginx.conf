# 开启gzip
gzip on;
# 启用gzip压缩的最小文件；小于设置值的文件将不会被压缩
gzip_min_length 1k;
# gzip 压缩级别 1-10
gzip_comp_level 2;
# 进行压缩的文件类型。
gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
# 是否在http header中添加Vary: Accept-Encoding，建议开启
gzip_vary on;
server {
    listen       80;
    server_name  localhost;
    client_max_body_size 200M;

    #charset koi8-r;
    #access_log  /var/log/nginx/log/host.access.log  main;
    
    # 主应用
    location /{
        root   /usr/share/nginx/html/baseline/main;
        index  index.html index.htm;
        proxy_set_header Host $host:38080;
        try_files $uri $uri/ /index.html;
    }
    location ~ ^/subApp/[\.a-zA-Z0-9_-]+/upms-provider/(.*) {
       set $service "http://gateway:7777/upms-provider/$1$is_args$args";
       proxy_pass $service;
    }
    
    location /subApp {
        alias   /usr/share/nginx/html/baseline/subApp;
        try_files $uri $uri/ /index.html;
        if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' *;
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
        add_header Content-Type text/plain;
        add_header Content-Length 0;
        # 对于Options方式的请求返回204，表示接受跨域请求
        return 204;
        }
        # 允许跨域的请求，可以自定义变量$http_origin，*表示所有
        add_header 'Access-Control-Allow-Origin' *;
      # 允许携带cookie请求
        add_header 'Access-Control-Allow-Credentials' 'true';
      # 允许跨域请求的方法：GET,POST,OPTIONS,PUT
        add_header 'Access-Control-Allow-Methods' 'GET,POST,OPTIONS,PUT,DELETE,PATCH';
      # 允许请求时携带的头部信息，*表示所有
        add_header 'Access-Control-Allow-Headers' *;
      # 允许发送按段获取资源的请求
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
    }
    
    #信息管理平台
    location ^~/subApp/infoManage/upms-provider {
        proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/infoManage/baseinfo-provider {
        proxy_pass http://gateway:7777/baseinfo-provider;
    }
    location ^~/subApp/infoManage/emgc-command-provider {
