# 开启gzip
gzip on;
# 启用gzip压缩的最小文件；小于设置值的文件将不会被压缩
gzip_min_length 1k;
# gzip 压缩级别 1-10 
gzip_comp_level 2;
# 进行压缩的文件类型。
gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
# 是否在http header中添加Vary: Accept-Encoding，建议开启
gzip_vary on;

server {
    listen       80;
    server_name  localhost;
    client_max_body_size 200M;
  
    #access_log  /var/log/nginx/log/host.access.log  main;

    # 禁止从nginx获取应用内部信息
    location ~ /.*/actuator {
        deny all;
    }

    # 管理后台
    location ^~/hc {
        root   /usr/share/nginx/html/;
        index  index.html index.htm;
    }
        
        
    location ^~/platform {
        root   /usr/share/nginx/html/;
        index  index.html index.htm;
    }

    
    location /openlogin {
        proxy_pass http://gateway:7777/upms-provider;
        proxy_set_header Host $host:30080;
        proxy_cookie_path /openlogin /;
        proxy_set_header Cookie "$http_cookie";
    }

    location ^~/hc/platform {
        proxy_pass http://gateway:7777/upms-provider;
    }


    location /model {
        proxy_pass http://gateway:7777/upms-provider/model;
    }

    location /editor {
        proxy_pass http://gateway:7777/upms-provider/editor;
    }

    # 基线
    location ^~/baseline {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /baseline/index.html;
    }
    
    location ^~/baseline/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    
    
    location ^~/baseline/message-center-provider {
       proxy_pass http://gateway:7777/message-center-provider;
    }
    
   location ^~/baseline/information-management-provider {
       proxy_pass http://gateway:7777/information-management-provider;
    }
      location ^~/baseline/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }

    location ^~/baseline/data-exchange-provider {
       proxy_pass http://gateway:7777/data-exchange-provider;
    }

    # qiankun
    location /{
        root   /usr/share/nginx/html/baseline/main;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }  
    #location /subApp {
        #alias /usr/share/nginx/html/baseline/subApp;
        #try_files $uri $uri/ /index.html;
    #}
   location /subApp {
      alias /usr/share/nginx/html/baseline/subApp;
      try_files $uri $uri/ /index.html;
      # 缓存控制设置，避免子应用更新要强刷才生效
      if ($uri ~* \.html$) {
         add_header Cache-Control "no-cache, no-store, must-revalidate";
         add_header Pragma "no-cache";
         add_header Expires 0;
      }
   }
    
    # 数据中台-start
    location ^~/subApp/dataCenter/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/dataCenter/data-exchange-provider {
       proxy_pass http://gateway:7777/data-exchange-provider;
    }
    # 数据中台-end
    
    # 算法中台-start
    location ^~/subApp/algorithmPlatform/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/algorithmPlatform/data-exchange-provider {
       proxy_pass http://gateway:7777/data-exchange-provider;
    }
    # 算法中台-end
    
    # 基础信息-start
    location ^~/subApp/basicInfomation/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/basicInfomation/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/basicInfomation/information-management-provider {
       proxy_pass http://gateway:7777/information-management-provider;
    }
	# 基础信息-end
    
    # 运行数据-start
    location ^~/subApp/operationMng/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/operationMng/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/operationMng/business-data-provider {
       proxy_pass http://gateway:7777/business-data-provider;
    }
	# 运行数据-end
    
    # 视频中心-start
    location ^~/subApp/videoCentre/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/videoCentre/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/videoCentre/video-center-provider {
       proxy_pass http://gateway:7777/video-center-provider;
    }
    location ^~/subApp/videoCentre/information-management-provider {
       proxy_pass http://gateway:7777/information-management-provider;
    }
	# 视频中心-end
    
    # 控制中心-start
    location ^~/subApp/controlCentre/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/controlCentre/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/controlCentre/control-center-provider {
       proxy_pass http://gateway:7777/control-center-provider;
    }
	# 控制中心-end
    
    # 应急管理-start
    location ^~/subApp/emergencyMng/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/emergencyMng/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/emergencyMng/message-center-provider {
       proxy_pass http://gateway:7777/message-center-provider;
    }
    location ^~/subApp/emergencyMng/emgc-command-provider {
       proxy_pass http://gateway:7777/emgc-command-provider;
    }
    location ^~/subApp/emergencyMng/information-management-provider {
       proxy_pass http://gateway:7777/information-management-provider;
    }
	# 应急管理-end

    # 智慧防汛-start
    location ^~/subApp/floodPrevention/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    location ^~/subApp/floodPrevention/file-provider {
       proxy_pass http://gateway:7777/file-provider;
    }
    location ^~/subApp/floodPrevention/message-center-provider {
       proxy_pass http://gateway:7777/message-center-provider;
    }
    location ^~/subApp/floodPrevention/level-measurement-provider {
       proxy_pass http://gateway:7777/level-measurement-provider;
    }
	# 智慧防汛-end
    
    # 大屏
    location ^~/screen {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /screen/index.html;
        proxy_set_header Host $host:30080;
    }
    
    location ^~/screen/upms-provider {
       proxy_pass http://gateway:7777/upms-provider;
    }
    
    location ^~/screen/emgc-command-provider {
       proxy_pass http://gateway:7777/emgc-command-provider;
    }
    
    # 消息中心websocket
    location /websocket/message {
       proxy_pass http://svc-message-center:9666/api/message;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Host $host:31080;
       proxy_set_header Connection "upgrade";
    }
        # 应急netty
    location /netty/chat {
       proxy_pass http://svc-emgc-command:9002/netty/chat;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Host $host:31080;
       proxy_set_header Connection "upgrade";
    }
    
    # 网关
    location /gateway/ {
        proxy_pass http://gateway:7777/;
        proxy_set_header Host $host:31080;
    }

    location /upms-provider {
        proxy_pass http://gateway:7777;
        # host 修改为真实的域名和端口
		proxy_set_header Host $http_host;
		# 客户端真实ip
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		# 客户端真实协议(http/https)
		proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location /file-provider {
        proxy_pass http://gateway:7777;
    }
    
    
     
    location /data-exchange-provider {
        proxy_pass http://gateway:7777;
    }
    
    location /business-management-provider {
        proxy_pass http://gateway:7777;
    }

    location /message-center-provider {
        proxy_pass http://gateway:7777;
    }
    
    location /emgc-command-provider {
        proxy_pass http://gateway:7777;
    }
  
    location /information-management-provider {
        proxy_pass http://gateway:7777;
    }
    
    location /business-data-provider {
        proxy_pass http://gateway:7777;
    }
    location /video-center-provider {
    	proxy_pass http://gateway:7777;
    }
    location /control-center-provider {
    	proxy_pass http://gateway:7777;
    }
    location /taxi-management-provider {
    	proxy_pass http://gateway:7777;
    }
    location /level-measurement-provider {
    	proxy_pass http://gateway:7777;
    }
    # 数字道路
    location ^~/digital3DRoad/wasm {
       root   /usr/share/nginx/html/;
       autoindex on;
       default_type application/wasm;
    }
   

    # 数据分享
    location ^~/datashare/proxy/ {
        proxy_pass http://gateway:7777/;
    }
    
    # 任务调度
    location /xxl-job-admin {
        proxy_pass http://cloud-xxl-job-admin:8080;
        proxy_set_header Host $host:31080;
    }

   
    # 服务监控
     #location /spring-boot-admin {
      #proxy_pass http://monitor-spring-boot-admin:9999;
      #proxy_set_header Host $host:30080;
    #}
    # 链路追踪
        #location /zipkin {
            #proxy_pass http://monitor-zipkin:9411;
        #}

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

}